<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- BOOTSTRAP CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<!-- CUSTOM CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white fixed-top shadow">
<div class="container">
<a class="navbar-brand fw-bold">Ilham Fajri</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li><a class="nav-link active" href="#home">Home</a></li>
<li><a class="nav-link" href="#about">About</a></li>
<li><a class="nav-link" href="#skills">Skills</a></li>
<li><a class="nav-link" href="about.html">Portfolio</a></li>
<li>
<button onclick="toggleMode()" class="btn btn-dark btn-sm ms-3 ripple">🌙</button>
</li>
</ul>
</div>
</div>
</nav>

<!-- HERO -->
<section id="home" class="hero" data-aos="fade-up">
<h1>Ilham Fajri</h1>
<p>Frontend Developer</p>
<a href="about.html" class="btn btn-modern ripple">Portfolio</a>
</section>

<!-- ABOUT -->
<section id="about" class="container py-5 text-center" data-aos="fade-right">
<img src="https://picsum.photos/200" class="rounded-circle float mb-3">
<h5>About Me</h5>
<p>Website modern, interaktif & responsive</p>
</section>

<!-- SKILLS (FIXED) -->
<section id="skills" class="container py-5" data-aos="fade-left">
<h4 class="mb-4">Skills</h4>

<p>HTML</p>
<div class="progress mb-3" style="height:25px;">
  <div class="progress-bar bg-danger progress-anim" data-width="90%">90%</div>
</div>

<p>CSS</p>
<div class="progress mb-3" style="height:25px;">
  <div class="progress-bar bg-success progress-anim" data-width="85%">85%</div>
</div>

<p>JavaScript</p>
<div class="progress mb-3" style="height:25px;">
  <div class="progress-bar bg-info progress-anim" data-width="80%">80%</div>
</div>

</section>

<!-- CONTACT -->
<section class="container pb-5">
<div class="card p-4 text-center">
<h5>Contact</h5>
<input class="form-control mb-2" placeholder="Nama">
<input class="form-control mb-2" placeholder="Email">
<textarea class="form-control mb-2"></textarea>
<button class="btn btn-modern ripple w-100">Kirim</button>
</div>
</section>

<footer class="text-center py-3">
© 2026 Ultimate UI
</footer>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

/* DARK MODE */
function toggleMode(){
document.body.classList.toggle("dark-mode");
}

/* NAV ACTIVE */
let sections = document.querySelectorAll("section");
let navLinks = document.querySelectorAll(".nav-link");

window.onscroll = () => {
sections.forEach(sec => {
let top = window.scrollY;
let offset = sec.offsetTop - 150;
let height = sec.offsetHeight;
let id = sec.getAttribute("id");

if(top >= offset && top < offset + height){
navLinks.forEach(link => link.classList.remove("active"));
document.querySelector('.nav-link[href*='+id+']').classList.add("active");
}
});
};

/* RIPPLE */ 
document.querySelectorAll(".ripple").forEach(btn=>{
btn.addEventListener("click",function(e){
let x = e.clientX - e.target.offsetLeft;
let y = e.clientY - e.target.offsetTop;

let span = document.createElement("span");
span.style.left = x+"px";
span.style.top = y+"px";

this.appendChild(span);

setTimeout(()=> span.remove(),600);
});
});

/* SKILL ANIMATION */
window.addEventListener("scroll", () => {
document.querySelectorAll(".progress-anim").forEach(bar => {
if(bar.style.width === ""){
let value = bar.getAttribute("data-width");
bar.style.width = value;
}
});
});
</script>

</body>
</html>
